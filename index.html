<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>All In · Gambling vs Businessman · Ultimate Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="vn-container">
    <div class="art-stage">
        <canvas id="bgCanvas" width="1280" height="720"></canvas>
        <div class="character-portrait-frame" id="portraitFrame">
            <canvas id="portraitCanvas" width="300" height="300"></canvas>
            <div class="character-name-tag" id="charNameTag"></div>
        </div>
    </div>
    <div class="dialogue-panel">
        <div class="speaker-name" id="speakerName">———</div>
        <div class="message-text" id="messageText">Every choice shapes your destiny...</div>
        <div id="choicesContainer" class="choices-area"></div>
        <div class="game-controls">
            <button id="resetBtn" class="ctrl-btn">⟳ RESTART</button>
            <button id="nextBtn" class="ctrl-btn">▶ CONTINUE</button>
        </div>
    </div>
    <footer>♢ ALL IN · A Visual Novel about gambling, power, and redemption ♢</footer>
</div>

<script src="script.js"></script>
</body>
</html>
