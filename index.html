<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>All In · Gambling vs Businessman · Extended Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="vn-container">
    <div class="art-stage">
        <img id="bgImage" class="background-image" src="" alt="background">
        <div class="character-portrait-frame" id="portraitFrame">
            <img id="portraitImage" class="portrait-image" src="" alt="character">
            <div class="character-name-tag" id="charNameTag"></div>
        </div>
    </div>
    <div class="dialogue-panel">
        <div class="speaker-name" id="speakerName">———</div>
        <div class="message-text" id="messageText">Loading story...</div>
        <div id="choicesContainer" class="choices-area"></div>
        <div class="game-controls">
            <button id="resetBtn" class="ctrl-btn">⟳ RESTART</button>
            <button id="nextBtn" class="ctrl-btn">▶ CONTINUE</button>
        </div>
    </div>
    <footer>♢ ALL IN · Extended Edition · Your Choices Shape the Journey ♢</footer>
</div>

<script src="script.js"></script>
</body>
</html>
